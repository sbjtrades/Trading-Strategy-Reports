<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30-Sec OR Ladder Rotations — Strategy Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #45475a;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 2em;
            color: #a6e3a1;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 0.95em;
            color: #6c7086;
        }
        
        .instrument-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #45475a;
            background: #252535;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }
        
        .instrument-tabs button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            background: #252535;
            color: #6c7086;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            border-bottom: 3px solid transparent;
        }
        
        .instrument-tabs button:hover {
            background: #2a2a3a;
            color: #a6e3a1;
        }
        
        .instrument-tabs button.active {
            background: #313244;
            color: #a6e3a1;
            border-bottom: 3px solid #a6e3a1;
        }
        
        .instrument-content {
            display: none;
        }
        
        .instrument-content.active {
            display: block;
        }
        
        .report-frame {
            width: 100%;
            height: 90vh;
            border: 1px solid #45475a;
            border-radius: 8px;
            background: #1e1e2e;
        }
        
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85em;
            color: #6c7086;
            padding-top: 15px;
            border-top: 1px solid #45475a;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .report-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .report-card:hover {
            background: rgba(74, 158, 255, 0.15);
            border-color: #4a9eff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 158, 255, 0.2);
        }
        
        .report-card h3 {
            color: #4a9eff;
            font-size: 1.4em;
            margin-bottom: 10px;
        }
        
        .report-meta {
            font-size: 0.9em;
            color: #808080;
            margin-bottom: 15px;
        }
        
        .report-desc {
            color: #c0c0c0;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        
        .btn {
            display: inline-block;
            background: #4a9eff;
            color: #1e1e2e;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 0.95em;
        }
        
        .btn:hover {
            background: #6bb3ff;
            box-shadow: 0 4px 12px rgba(74, 158, 255, 0.4);
        }
        
        .badge {
            display: inline-block;
            background: #4a9eff;
            color: #1e1e2e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .strategy-info {
            background: rgba(74, 158, 255, 0.1);
            border-left: 4px solid #4a9eff;
            padding: 15px 20px;
            border-radius: 4px;
            font-size: 0.95em;
            margin-bottom: 20px;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(74, 158, 255, 0.2);
            color: #606060;
            font-size: 0.9em;
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 30-Sec OR Ladder Rotations</h1>
            <p class="subtitle">3-Year Backtest Analysis with Multi-Instrument Comparison</p>
        </header>
        
        <div class="instrument-tabs">
            <button class="tab-btn active" onclick="switchInstrument(event, 'nq')">
                📈 NQ/MNQ — 7,027 trades
            </button>
            <button class="tab-btn" onclick="switchInstrument(event, 'es')">
                📊 ES/MES — Multi-year backtest
            </button>
        </div>
        
        <div id="nq" class="instrument-content active">
            <iframe 
                src="30-sec-or-ladder-rotations/reports/master/index.html" 
                class="report-frame"
                frameborder="0"
                allow="fullscreen"
            ></iframe>
        </div>
        
        <div id="es" class="instrument-content">
            <iframe 
                src="es-mes/reports/master/index.html" 
                class="report-frame"
                frameborder="0"
                allow="fullscreen"
            ></iframe>
        </div>
        
        <footer>
            Last Updated: April 20, 2026 | All analysis generated from live TradingView backtest data
        </footer>
    </div>
    
    <script>
        function switchInstrument(event, instrument) {
            // Hide all content
            document.querySelectorAll('.instrument-content').forEach(el => {
                el.classList.remove('active');
            });
            
            // Remove active class from all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected content
            document.getElementById(instrument).classList.add('active');
            
            // Mark selected tab as active
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
