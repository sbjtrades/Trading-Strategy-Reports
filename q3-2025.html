<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 2025 — NQ/MNQ — 30-Sec OR Ladder Rotations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #45475a;
            padding-bottom: 20px;
        }
        
        .breadcrumb {
            font-size: 0.85em;
            color: #6c7086;
            margin-bottom: 10px;
        }
        
        .breadcrumb a {
            color: #89b4fa;
            text-decoration: none;
            margin: 0 5px;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        h1 {
            font-size: 2em;
            color: #a6e3a1;
            margin-bottom: 10px;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            padding: 20px;
            background: #252535;
            border-radius: 8px;
        }
        
        .nav-tabs button {
            padding: 10px 20px;
            border: 2px solid #45475a;
            background: #252535;
            color: #cdd6f4;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            font-weight: 600;
        }
        
        .nav-tabs button:hover {
            border-color: #a6e3a1;
            color: #a6e3a1;
        }
        
        .nav-tabs button.active {
            background: #a6e3a1;
            color: #1e1e2e;
            border-color: #a6e3a1;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .report-frame {
            width: 100%;
            height: 90vh;
            border: 1px solid #45475a;
            border-radius: 8px;
            background: #1e1e2e;
            margin-bottom: 30px;
        }
        
        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.85em;
            color: #6c7086;
            padding-top: 20px;
            border-top: 1px solid #45475a;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="breadcrumb">
                <a href="../../index.html">← Home</a> / 
                <a href="../nq.html">NQ/MNQ</a> / 
                <a href="nq-2025-drilldown.html">2025</a> / 
                <strong>Q3</strong>
            </div>
            <h1>📊 Q3 2025 — NQ/MNQ</h1>
            <p style="color: #6c7086;">July — September 2025</p>
        </header>
        
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'quarter')">🔷 Q3 Summary</button>
            <button class="tab-btn" onclick="switchTab(event, 'jul')">Jul 2025</button>
            <button class="tab-btn" onclick="switchTab(event, 'aug')">Aug 2025</button>
            <button class="tab-btn" onclick="switchTab(event, 'sep')">Sep 2025</button>
        </div>
        
        <!-- QUARTER TAB -->
        <div id="quarter" class="tab-content active">
            <iframe src="reports/nq/drill-down/2025/quarterly/q3.html" class="report-frame"></iframe>
        </div>
        
        <!-- MONTHLY TABS -->
        <div id="jul" class="tab-content">
            <iframe src="reports/nq/drill-down/2025/monthly/month-07.html" class="report-frame"></iframe>
        </div>
        
        <div id="aug" class="tab-content">
            <iframe src="reports/nq/drill-down/2025/monthly/month-08.html" class="report-frame"></iframe>
        </div>
        
        <div id="sep" class="tab-content">
            <iframe src="reports/nq/drill-down/2025/monthly/month-09.html" class="report-frame"></iframe>
        </div>
        
        <footer>
            All reports generated from master backtest data | NQ/MNQ 30-Second OR Ladder Rotations
        </footer>
    </div>
    
    <script>
        function switchTab(event, tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
