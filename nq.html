<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQ/MNQ — 30-Sec OR Ladder Rotations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #45475a;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 2em;
            color: #a6e3a1;
            margin-bottom: 5px;
        }
        
        .breadcrumb {
            font-size: 0.85em;
            color: #6c7086;
            margin-bottom: 10px;
        }
        
        .breadcrumb a {
            color: #89b4fa;
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .report-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #45475a;
            background: #252535;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }
        
        .report-tabs button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            background: #252535;
            color: #6c7086;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            border-bottom: 3px solid transparent;
        }
        
        .report-tabs button:hover {
            background: #2a2a3a;
            color: #a6e3a1;
        }
        
        .report-tabs button.active {
            background: #313244;
            color: #a6e3a1;
            border-bottom: 3px solid #a6e3a1;
        }
        
        .report-content {
            display: none;
        }
        
        .report-content.active {
            display: block;
        }
        
        .report-frame {
            width: 100%;
            height: 90vh;
            border: 1px solid #45475a;
            border-radius: 8px;
            background: #1e1e2e;
        }
        
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85em;
            color: #6c7086;
            padding-top: 15px;
            border-top: 1px solid #45475a;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="breadcrumb">
                <a href="index.html">← Back to Home</a>
            </div>
            <h1>📈 NQ/MNQ — 30-Sec OR Ladder Rotations</h1>
            <p style="color: #6c7086; font-size: 0.95em;">3-Year Backtest Analysis (7,027 Trades)</p>
        </header>
        
        <div class="report-tabs">
            <button class="tab-btn active" onclick="switchReport(event, 'master')">
                📊 3-Year Master
            </button>
            <button class="tab-btn" onclick="switchReport(event, 'week16')">
                📅 Week 16 (Apr 13-17)
            </button>
        </div>
        
        <div id="master" class="report-content active">
            <iframe 
                src="reports/nq/master/index.html" 
                class="report-frame"
                frameborder="0"
                allow="fullscreen"
            ></iframe>
        </div>
        
        <div id="week16" class="report-content">
            <iframe 
                src="reports/nq/week16/index.html" 
                class="report-frame"
                frameborder="0"
                allow="fullscreen"
            ></iframe>
        </div>
        
        <footer>
            Last Updated: April 20, 2026 | All analysis from live TradingView backtest data
        </footer>
    </div>
    
    <script>
        function switchReport(event, report) {
            // Hide all content
            document.querySelectorAll('.report-content').forEach(el => {
                el.classList.remove('active');
            });
            
            // Remove active class from all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected content
            document.getElementById(report).classList.add('active');
            
            // Mark selected tab as active
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
