<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 Daily Summary — ES/MES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #45475a;
            padding-bottom: 20px;
        }
        
        .breadcrumb {
            font-size: 0.85em;
            color: #6c7086;
            margin-bottom: 10px;
        }
        
        .breadcrumb a {
            color: #89b4fa;
            text-decoration: none;
            margin: 0 5px;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        h1 {
            font-size: 2em;
            color: #a6e3a1;
            margin-bottom: 10px;
        }
        
        .summary-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: #252535;
            border-radius: 8px;
        }
        
        .stat-card {
            padding: 15px;
            background: #1e1e2e;
            border: 2px solid #45475a;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: #6c7086;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 1.5em;
            color: #a6e3a1;
            font-weight: 600;
        }
        
        .highlights {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }
        
        .highlight-section {
            padding: 20px;
            background: #252535;
            border-radius: 8px;
            border: 2px solid #45475a;
        }
        
        .highlight-section h3 {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #45475a;
        }
        
        .best-day h3 {
            color: #a6e3a1;
        }
        
        .worst-day h3 {
            color: #f38ba8;
        }
        
        .day-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #1e1e2e;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .day-date {
            font-weight: 600;
            margin-bottom: 3px;
        }
        
        .day-stats {
            color: #6c7086;
            font-size: 0.85em;
            line-height: 1.4;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #252535;
            border-radius: 8px;
            overflow: hidden;
        }
        
        th {
            background: #45475a;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #45475a;
            color: #a6e3a1;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #45475a;
        }
        
        tr:hover {
            background: #2a2a3a;
        }
        
        tr.best-day-row {
            background: rgba(166, 227, 161, 0.1);
        }
        
        tr.worst-day-row {
            background: rgba(243, 139, 168, 0.1);
        }
        
        .positive {
            color: #a6e3a1;
        }
        
        .negative {
            color: #f38ba8;
        }
        
        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.85em;
            color: #6c7086;
            padding-top: 20px;
            border-top: 1px solid #45475a;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c7086;
        }
        
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .controls button {
            padding: 8px 15px;
            background: #45475a;
            color: #cdd6f4;
            border: 1px solid #45475a;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .controls button:hover {
            background: #a6e3a1;
            color: #1e1e2e;
            border-color: #a6e3a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="breadcrumb">
                <a href="index.html">← Home</a> / 
                <a href="es.html">ES/MES</a> / 
                <a href="es-2025-drilldown.html">2025</a> / 
                <strong>Daily Summary</strong>
            </div>
            <h1>📆 2025 Daily Summary — ES/MES</h1>
            <p style="color: #6c7086;">All 256 trading days in 2025 with best/worst highlights</p>
        </header>
        
        <div class="summary-box" id="summaryStats">
            <div class="loading">Loading daily summary data...</div>
        </div>
        
        <div class="highlights" id="highlightsSection" style="display: none;">
            <div class="highlight-section best-day">
                <h3>🎯 Top 3 Best Days</h3>
                <div id="bestDays"></div>
            </div>
            <div class="highlight-section worst-day">
                <h3>⚠️ Top 3 Worst Days</h3>
                <div id="worstDays"></div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="sortBy('date')">Sort by Date</button>
            <button onclick="sortBy('pnl')">Sort by P&L</button>
            <button onclick="sortBy('trades')">Sort by Trade Count</button>
        </div>
        
        <div id="tableContainer" style="overflow-x: auto;"></div>
        
        <footer>
            All data generated from master backtest | ES/MES 30-Second OR Ladder Rotations
        </footer>
    </div>
    
    <script>
        let dailyData = [];
        let currentSort = 'date';
        
        async function loadDailyData() {
            try {
                const response = await fetch('reports/es/drill-down/2025/daily/summary.csv');
                const text = await response.text();
                
                const lines = text.trim().split('\n');
                const headers = lines[0].split(',');
                
                dailyData = lines.slice(1).map(line => {
                    const values = line.split(',');
                    return {
                        date: values[0],
                        trades: parseInt(values[1]),
                        wins: parseInt(values[2]),
                        losses: parseInt(values[3]),
                        winPct: parseFloat(values[4]),
                        pnl: parseFloat(values[5]),
                        avgPnl: parseFloat(values[6])
                    };
                });
                
                renderData();
            } catch (error) {
                document.getElementById('tableContainer').innerHTML = 
                    '<p style="color: #f38ba8;">Error loading daily summary data</p>';
            }
        }
        
        function renderData() {
            renderSummaryStats();
            renderHighlights();
            renderTable();
        }
        
        function renderSummaryStats() {
            const totalTrades = dailyData.reduce((sum, d) => sum + d.trades, 0);
            const totalWins = dailyData.reduce((sum, d) => sum + d.wins, 0);
            const totalLosses = dailyData.reduce((sum, d) => sum + d.losses, 0);
            const totalPnl = dailyData.reduce((sum, d) => sum + d.pnl, 0);
            const winPct = (totalWins / totalTrades * 100).toFixed(1);
            const avgPnl = (totalPnl / dailyData.length).toFixed(2);
            
            document.getElementById('summaryStats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Trades</div>
                    <div class="stat-value">${totalTrades}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Days</div>
                    <div class="stat-value">${dailyData.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Win % (Total)</div>
                    <div class="stat-value" style="color: #a6e3a1;">${winPct}%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total P&L</div>
                    <div class="stat-value" style="color: ${totalPnl >= 0 ? '#a6e3a1' : '#f38ba8'};">${totalPnl.toFixed(2)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg P&L/Day</div>
                    <div class="stat-value" style="color: ${avgPnl >= 0 ? '#a6e3a1' : '#f38ba8'};">${avgPnl}</div>
                </div>
            `;
        }
        
        function renderHighlights() {
            const sorted = [...dailyData].sort((a, b) => b.pnl - a.pnl);
            
            const bestDays = sorted.slice(0, 3);
            const worstDays = sorted.slice(-3).reverse();
            
            document.getElementById('bestDays').innerHTML = bestDays.map(day => `
                <div class="day-item">
                    <div class="day-date">${day.date}</div>
                    <div class="day-stats">
                        <strong>${day.pnl > 0 ? '+' : ''}${day.pnl.toFixed(2)}</strong> | 
                        ${day.wins}W/${day.losses}L | 
                        ${day.winPct.toFixed(1)}% | 
                        ${day.trades} trades
                    </div>
                </div>
            `).join('');
            
            document.getElementById('worstDays').innerHTML = worstDays.map(day => `
                <div class="day-item">
                    <div class="day-date">${day.date}</div>
                    <div class="day-stats">
                        <strong>${day.pnl > 0 ? '+' : ''}${day.pnl.toFixed(2)}</strong> | 
                        ${day.wins}W/${day.losses}L | 
                        ${day.winPct.toFixed(1)}% | 
                        ${day.trades} trades
                    </div>
                </div>
            `).join('');
            
            document.getElementById('highlightsSection').style.display = 'grid';
        }
        
        function renderTable() {
            const sorted = [...dailyData].sort((a, b) => {
                if (currentSort === 'date') return new Date(a.date) - new Date(b.date);
                if (currentSort === 'pnl') return b.pnl - a.pnl;
                if (currentSort === 'trades') return b.trades - a.trades;
            });
            
            const bestDates = new Set([...dailyData].sort((a, b) => b.pnl - a.pnl).slice(0, 3).map(d => d.date));
            const worstDates = new Set([...dailyData].sort((a, b) => b.pnl - a.pnl).slice(-3).map(d => d.date));
            
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th style="text-align: right;">Trades</th>
                            <th style="text-align: right;">W/L</th>
                            <th style="text-align: right;">Win %</th>
                            <th style="text-align: right;">P&L</th>
                            <th style="text-align: right;">Avg P&L</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sorted.map(day => {
                            let rowClass = '';
                            if (bestDates.has(day.date)) rowClass = 'best-day-row';
                            if (worstDates.has(day.date)) rowClass = 'worst-day-row';
                            
                            return `
                                <tr class="${rowClass}">
                                    <td>${day.date}</td>
                                    <td style="text-align: right;">${day.trades}</td>
                                    <td style="text-align: right;"><span class="positive">${day.wins}W</span>/<span class="${day.losses > 0 ? 'negative' : ''}">${day.losses}L</span></td>
                                    <td style="text-align: right;">${day.winPct.toFixed(1)}%</td>
                                    <td style="text-align: right;" class="${day.pnl >= 0 ? 'positive' : 'negative'}">${day.pnl > 0 ? '+' : ''}${day.pnl.toFixed(2)}</td>
                                    <td style="text-align: right;" class="${day.avgPnl >= 0 ? 'positive' : 'negative'}">${day.avgPnl > 0 ? '+' : ''}${day.avgPnl.toFixed(2)}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('tableContainer').innerHTML = html;
        }
        
        function sortBy(sort) {
            currentSort = sort;
            renderTable();
        }
        
        loadDailyData();
    </script>
</body>
</html>
